services:
  - type: web
    name: sra-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sra-postgres
          property: connectionString

databases:
  - name: sra-postgres
    databaseName: sra_db
    user: sra_user
